<div class="flex h-screen p-4">
  <div class="w-1/4 p-4 bg-gray-100 border border-gray-300 rounded-xl">
    <div *ngIf="user" class="text-xl font-bold mb-4">
      {{ user.displayName }}
    </div>
    <button
      (click)="onLogout()"
      class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded flex gap-1"
    >
      Logout
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-6 h-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"
        />
      </svg>
    </button>
  </div>

  <div class="w-3/4 p-4">
    <div
      class="border border-gray-300 p-4 h-4/5 overflow-y-auto mb-4 rounded-xl bg-slate-100"
    >
      <div
        *ngFor="let message of messages | async"
        class="mb py-3 px-5 flex"
        [ngClass]="
          message.user.id === user.uid ? 'justify-end' : 'justify-start'
        "
      >
        <div class="flex flex-col bg-green-500 p-3 rounded-xl">
          <div class="font-bold text-lg">
            {{ message.user.username }}
          </div>
          <div class="text-white text-base font-semibold">
            {{ message.text }}
          </div>
        </div>
        <button
          *ngIf="message.user.id === user.uid && !editMode"
          (click)="onDelete(message.key, message.user.id)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-6 h-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
            />
          </svg>
        </button>
        <button
          *ngIf="message.user.id === user.uid && !editMode"
          (click)="onToggleEditMode(message)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-6 h-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"
            />
          </svg>
        </button>
      </div>
    </div>

    <form #chatForm="ngForm" (ngSubmit)="onSubmit(chatForm)">
      <div class="flex">
        <input
          type="text"
          name="message"
          [(ngModel)]="messageRef"
          required
          [placeholder]="editMode ? 'Update message...' : 'Write message...'"
          class="flex-grow border border-gray-300 p-2 rounded-l-xl"
        />
        <button
          type="submit"
          [disabled]="!chatForm.valid"
          class="text-white font-bold py-2 px-4 rounded-r"
          [ngClass]="
            !chatForm.valid
              ? 'bg-slate-300 hover:bg-slate-300'
              : 'bg-blue-500 hover:bg-blue-600'
          "
        >
          <span *ngIf="editMode; else sendTemplate">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-6 h-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"
              />
            </svg>
          </span>
          <ng-template #sendTemplate>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-6 h-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"
              />
            </svg>
          </ng-template>
        </button>
      </div>
    </form>
  </div>
</div>
